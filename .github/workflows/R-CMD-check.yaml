name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      _R_CHECK_FORCE_SUGGESTS_: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install graph system dependencies
        run: sudo apt-get install -y libglpk-dev libxml2-dev

      - name: Install package dependencies
        run: |
          install.packages(c(
            "yaml",
            "ggplot2",
            "igraph",
            "ggraph",
            "ape",
            "testthat",
            "pkgload",
            "quarto",
            "knitr",
            "rmarkdown",
            "rcmdcheck"
          ))
        shell: Rscript {0}

      - name: Check package
        run: rcmdcheck::rcmdcheck(args = "--no-manual", error_on = "error")
        shell: Rscript {0}

      - name: Smoke-test installed package
        run: Rscript tools/smoke-installed-package.R .

      - name: Smoke-test user workflow
        run: Rscript tools/smoke-user-workflow.R .

      - name: Run quick acceptance matrix
        run: Rscript tools/run-acceptance.R . quick
