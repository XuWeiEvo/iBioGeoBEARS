name: test-coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      _R_CHECK_FORCE_SUGGESTS_: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install graph system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev libxml2-dev

      - name: Install package and coverage dependencies
        run: |
          install.packages(c(
            "yaml", "ggplot2", "igraph", "ggraph", "ape", "zip",
            "testthat", "pkgload", "scales", "covr", "xml2"
          ))
        shell: Rscript {0}

      - name: Compute coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov, filename = "cobertura.xml")
          print(covr::percent_coverage(cov))
        shell: Rscript {0}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
